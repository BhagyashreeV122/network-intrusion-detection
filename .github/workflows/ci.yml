name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.11
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Generate Mock Models for CI
      run: |
        # Create a tiny script to generate dummy models so tests pass without local files
        python -c "
        import torch, joblib, os, numpy as np
        from sklearn.preprocessing import StandardScaler, LabelEncoder
        from sklearn.ensemble import RandomForestClassifier
        os.makedirs('models', exist_ok=True)
        with open('models/ae_threshold.txt', 'w') as f: f.write('0.1')
        dummy_data = np.random.rand(10, 42)
        scaler = StandardScaler(); scaler.fit(dummy_data)
        scaler.feature_names_in_ = np.array(['dur', 'spkts', 'dpkts', 'sbytes', 'dbytes', 'rate', 'sttl', 'dttl', 'sload', 'dload', 'sloss', 'dloss', 'sinpkt', 'dinpkt', 'sjit', 'djit', 'swin', 'stcpb', 'dtcpb', 'dwin', 'tcprtt', 'synack', 'ackdat', 'smean', 'dmean', 'trans_depth', 'response_body_len', 'ct_srv_src', 'ct_state_ttl', 'ct_dst_ltm', 'ct_src_dport_ltm', 'ct_dst_sport_ltm', 'ct_dst_src_ltm', 'is_ftp_login', 'ct_ftp_cmd', 'ct_flw_http_mthd', 'ct_src_ltm', 'ct_srv_dst', 'is_sm_ips_ports'])
        joblib.dump(scaler, 'models/scaler.pkl')
        les = {'proto': LabelEncoder().fit(['tcp', 'udp', 'icmp']), 'service': LabelEncoder().fit(['-', 'http', 'dns']), 'state': LabelEncoder().fit(['FIN', 'INT', 'CON'])}
        joblib.dump(les, 'models/label_encoders.pkl')
        class Autoencoder(torch.nn.Module):
            def __init__(self, d): super().__init__(); self.e = torch.nn.Linear(d, 10); self.d = torch.nn.Linear(10, d)
            def forward(self, x): return self.d(self.e(x))
        torch.save(Autoencoder(42).state_dict(), 'models/autoencoder.pth')
        rf = RandomForestClassifier(n_estimators=1); rf.fit(dummy_data, np.random.randint(0, 2, 10))
        joblib.dump(rf, 'models/rf_baseline.pkl')
        "
        
    - name: Run Pytest
      run: |
        pytest tests/
